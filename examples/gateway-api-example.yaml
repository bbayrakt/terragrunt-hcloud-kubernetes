---
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    app: demo

---
# Simple web application deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: demo
  labels:
    app: hello-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: web
        image: hashicorp/http-echo:latest
        args:
          - -text=Hello from Gateway API! 🚀
          - -listen=:8080
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: hello-app
  namespace: demo
  labels:
    app: hello-app
spec:
  type: ClusterIP
  selector:
    app: hello-app
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP

---
# HTTPRoute for HTTPS traffic (requires TLS certificate)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-app-https
  namespace: demo
  labels:
    app: hello-app
spec:
  parentRefs:
  - name: cilium-gateway
    namespace: ingress
    sectionName: https-example
  
  hostnames:
  - staging.cluster.example.com
  
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hello
    backendRefs:
    - name: hello-app
      namespace: demo
      port: 80
      weight: 1

---
# HTTPRoute for HTTP traffic (redirect to HTTPS)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-app-http-redirect
  namespace: demo
  labels:
    app: hello-app
spec:
  parentRefs:
  - name: cilium-gateway
    namespace: ingress
    sectionName: http-example
  
  hostnames:
  - staging.cluster.example.com
  
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /hello
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
